<!DOCTYPE html>
<html lang="pt-br" x-data="menuApp()" :class="{ 'dark': darkMode }" x-init="init()">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title x-text="config.restaurantName + ' • Cardápio Digital'">Cardápio Digital Pro</title>
  <meta name="theme-color" content="#ef4444">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
  <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.13/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.13/plugin/relativeTime.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.13/locale/pt-br.js"></script>

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>

  <link rel="stylesheet" href="style.css">
  <script src="js/include.js"></script>
</head>

<body class="bg-surface font-body transition-colors duration-300" x-cloak>

  <!-- Toast -->
  <div x-show="toast.visible" x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 translate-y-4"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-3 px-5 py-3 rounded-2xl shadow-2xl text-white font-medium text-sm"
    :class="toast.type==='success'?'bg-green-500':toast.type==='error'?'bg-red-500':'bg-gray-800'"
    style="min-width:220px">
    <span x-text="toast.icon" class="text-lg"></span>
    <span x-text="toast.message"></span>
  </div>

  <!-- Header -->
  <header class="sticky top-0 z-40 bg-surface-card border-b border-border backdrop-blur-sm">
    <div class="max-w-2xl mx-auto px-4 py-3 flex justify-between items-center gap-2 min-w-0">

      <!-- Logo + nome -->
      <div class="flex items-center gap-2 min-w-0 flex-1">
        <div
          class="w-9 h-9 sm:w-10 sm:h-10 rounded-xl flex items-center justify-center text-white font-display font-bold text-lg flex-shrink-0 shadow-sm"
          :style="`background:var(--accent)`" x-text="config.restaurantName.charAt(0)"></div>
        <div class="min-w-0 leading-tight">
          <h1 class="text-sm sm:text-base font-display font-bold text-text-primary truncate"
            x-text="config.restaurantName"></h1>
          <p class="text-[10px] sm:text-xs flex items-center gap-1 font-body whitespace-nowrap">
            <span class="w-1.5 h-1.5 rounded-full"
              :class="config.isOpen ? 'bg-green-500 animate-pulse' : 'bg-red-400'"></span>
            <span class="text-text-muted truncate" x-text="config.isOpen ? 'Aberto' : 'Fechado'"></span>
          </p>
        </div>
      </div>

      <!-- Ações direita -->
      <div class="flex items-center gap-1 sm:gap-2 flex-none" style="min-width:fit-content">

        <!-- Botão: não autenticado -->
        <button x-show="!isCloudAuthenticated" x-cloak @click="showAdminLogin = true"
          class="btn-enter-shimmer relative flex items-center gap-1.5 pl-2 pr-3 py-1.5 rounded-xl border text-xs font-bold transition-all active:scale-95 hover:scale-105 flex-shrink-0 overflow-hidden"
          style="border-color:var(--accent);background:linear-gradient(90deg,var(--surface-muted) 0%,color-mix(in srgb,var(--accent) 18%,var(--surface-muted)) 40%,var(--surface-muted) 80%);color:var(--text-primary)">
          <div class="w-5 h-5 rounded-lg flex items-center justify-center flex-shrink-0"
            style="background:color-mix(in srgb,var(--accent) 20%,transparent)">
            <svg class="w-3 h-3" style="color:var(--accent)" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"
                d="M8 11V7a4 4 0 018 0m-4 8v2m-6 2h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z" />
            </svg>
          </div>
          <span style="color:var(--accent)">Entrar</span>
        </button>

        <!-- Botão: Admin -->
        <button x-show="isCloudAuthenticated && isCloudAdmin" x-cloak @click="showAdminPanel = true"
          class="btn-admin relative flex items-center gap-2 pl-2 pr-2.5 py-1.5 rounded-xl border text-xs font-bold transition-all active:scale-95 hover:scale-105 flex-shrink-0 group"
          style="border-color:rgba(239,68,68,.4);background:rgba(239,68,68,.1)">
          <div class="relative flex-shrink-0">
            <span class="ring-ping absolute inset-0 rounded-lg" style="background:rgba(239,68,68,.35)"></span>
            <div class="relative w-6 h-6 rounded-lg flex items-center justify-center text-white font-black text-[11px]"
              style="background:#ef4444" x-text="userAvatarInitial"></div>
          </div>
          <span class="hidden sm:inline text-[11px] font-bold truncate max-w-[80px]" style="color:#ef4444"
            x-text="userProfile.displayName || cloudUser?.email?.split('@')[0] || 'Admin'"></span>
          <svg class="gear-icon w-3.5 h-3.5 flex-shrink-0 opacity-60 group-hover:opacity-100 transition-opacity"
            style="color:#ef4444" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <circle cx="12" cy="12" r="3" stroke-width="2" />
          </svg>
        </button>

        <!-- Botão: Atendente -->
        <button x-show="isCloudAuthenticated && isCloudWorker && !isCloudAdmin" x-cloak @click="showAdminPanel = true"
          class="btn-worker relative flex items-center gap-2 pl-2 pr-2.5 py-1.5 rounded-xl border text-xs font-bold transition-all active:scale-95 hover:scale-105 flex-shrink-0 group"
          style="border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.1)">
          <div class="relative flex-shrink-0">
            <span class="ring-ping absolute inset-0 rounded-lg" style="background:rgba(245,158,11,.35)"></span>
            <div class="relative w-6 h-6 rounded-lg flex items-center justify-center text-white font-black text-[11px]"
              style="background:#f59e0b" x-text="userAvatarInitial"></div>
          </div>
          <span class="hidden sm:inline text-[11px] font-bold truncate max-w-[80px]" style="color:#f59e0b"
            x-text="userProfile.displayName || cloudUser?.email?.split('@')[0] || 'Atendente'"></span>
          <svg class="gear-icon w-3.5 h-3.5 flex-shrink-0 opacity-60 group-hover:opacity-100 transition-opacity"
            style="color:#f59e0b" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <circle cx="12" cy="12" r="3" stroke-width="2" />
          </svg>
        </button>

        <!-- Botão: Cliente -->
        <button x-show="isCloudAuthenticated && !isCloudAdmin && !isCloudWorker" x-cloak
          @click="showUserProfile = true; userProfileTab = 'profile'"
          class="btn-client relative flex items-center gap-2 pl-2 pr-2.5 py-1.5 rounded-xl border text-xs font-bold transition-all active:scale-95 hover:scale-105 flex-shrink-0"
          style="border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.1)">
          <div class="relative flex-shrink-0">
            <span class="ring-ping absolute inset-0 rounded-lg" style="background:rgba(59,130,246,.25)"></span>
            <div class="relative w-6 h-6 rounded-lg flex items-center justify-center text-white font-black text-[11px]"
              style="background:#3b82f6" x-text="userAvatarInitial"></div>
          </div>
          <span class="hidden sm:inline text-[11px] font-bold truncate max-w-[80px]" style="color:#3b82f6"
            x-text="userProfile.displayName || cloudUser?.email?.split('@')[0] || 'Minha conta'"></span>
          <svg class="w-3 h-3 flex-shrink-0 opacity-50" style="color:#3b82f6" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
          </svg>
        </button>

        <!-- Carrinho -->
        <button @click="showCart = true" x-show="!isCloudAdmin && !isCloudWorker"
          class="relative cart-btn flex items-center gap-1.5 px-2.5 py-2 rounded-xl font-medium text-sm text-white flex-shrink-0 transition-all active:scale-95 shadow-sm"
          :style="`background:var(--accent)`">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 100 4 2 2 0 000-4z" />
          </svg>
          <span x-show="cartTotalItems > 0" x-text="cartTotalItems" class="font-display font-bold text-xs"></span>
        </button>

        <!-- Rastreamento de pedidos -->
        <button @click="showOrderTracking = true" x-show="!isCloudAdmin && !isCloudWorker"
          class="icon-btn relative flex-shrink-0" title="Meu Pedido">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
          </svg>
          <span x-show="orderHistory.length > 0"
            class="absolute top-0.5 right-0.5 w-2 h-2 rounded-full border border-surface-card"
            style="background:var(--accent)"></span>
        </button>

        <!-- Tema / cores (desktop) -->
        <div class="hidden sm:flex items-center gap-1">
          <button @click="showThemePicker = true" class="icon-btn flex-shrink-0" title="Cores">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
            </svg>
          </button>
          <button @click="darkMode = !darkMode; saveSetting('darkMode', darkMode)" class="icon-btn flex-shrink-0"
            title="Tema">
            <svg x-show="!darkMode" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
            <svg x-show="darkMode" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364-.707-.707M6.343 6.343l-.707-.707m12.728 0-.707.707M6.343 17.657l-.707.707M12 8a4 4 0 110 8 4 4 0 010-8z" />
            </svg>
          </button>
        </div>

      </div>
    </div>
  </header>




  <!-- ── MAIN ── -->
  <main class="max-w-2xl mx-auto px-4 pb-28 pt-4">

    <!-- ══════════════════════════════════════════
         CONTEÚDO PRINCIPAL
    ══════════════════════════════════════════ -->
    <div data-include="components/main.html"></div>
    <!-- ══════════════════════════════════════════
         INCLUDES DINÂMICOS
    ══════════════════════════════════════════ -->
    <div x-data="include('includes/pix-modal.html')" x-html="content"></div>
    <div x-data="include('includes/theme-picker.html')" x-html="content"></div>
    <div x-data="include('includes/order-tracking.html')" x-html="content"></div>


  </main>


  <!-- ══════════════════════════════════════════
         MODAIS Admin
    ══════════════════════════════════════════ -->
  <div data-include="components/admin.html"></div>


  <!-- ══════════════════════════════════════════
         MODAIS GLOBAIS (Login, Perfil, Carrinho, etc)
    ══════════════════════════════════════════ -->
  <div data-include="components/modals.html"></div>


  <!-- Scripts -->
  <script src="js/env.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/logger.js"></script>
  <script src="js/database.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/address.js"></script>
  <script src="js/storeMap.js"></script>
  <script src="js/product-card.js"></script>
  <script src="js/promo-filter.js"></script>
  <script src="js/tracking.js"></script>
  <script src="js/order-manager.js"></script>
  <script src="js/emoji-picker.js"></script>
  <script src="js/report-template.js"></script>
  <script src="app.js"></script>



  <!-- Dev Toolbar (visível apenas em desenvolvimento) -->
  <template x-if="$store?.env?.isDev ?? window.APP_ENV?.isDev">
    <div class="fixed bottom-4 right-4 z-[999]" x-data="{ open: false }" @click.outside="open = false">
      <button @click="open = !open"
        class="w-10 h-10 rounded-2xl shadow-lg flex items-center justify-center transition-all duration-200 hover:scale-110 active:scale-90"
        :style="`background:var(--surface-card);border:1px solid var(--border);color:var(--accent);box-shadow:0 4px 14px color-mix(in srgb,var(--accent) 18%,transparent)`"
        title="Dev Tools">🛠️</button>
      <div x-show="open" x-transition:enter="transition ease-out duration-150"
        x-transition:enter-start="opacity-0 scale-95 translate-y-2"
        x-transition:enter-end="opacity-100 scale-100 translate-y-0"
        class="absolute bottom-12 right-0 w-60 rounded-2xl overflow-hidden"
        :style="`background:var(--surface-card);border:1px solid var(--border);box-shadow:0 20px 40px rgba(0,0,0,.15);color:var(--text-primary)`">
        <div class="px-3 py-2.5 flex items-center gap-2"
          :style="`background:var(--surface-muted);border-bottom:1px solid var(--border)`">
          <span class="w-2 h-2 rounded-full flex-shrink-0"
            :style="cloudUser?.isLoggedIn ? 'background:var(--accent)' : 'background:#64748b'"></span>
          <div class="flex-1 min-w-0">
            <p class="text-[10px] font-mono font-bold truncate" style="color:var(--text-primary)"
              x-text="cloudUser?.email ?? 'nenhum'"></p>
            <p class="text-[9px] font-mono" style="color:var(--text-muted)"
              x-text="'roles: ' + (cloudUser?.roles?.join(', ') ?? '—')"></p>
          </div>
          <span class="text-[8px] font-black px-1.5 py-0.5 rounded-md flex-shrink-0 tracking-widest"
            style="background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)">DEV</span>
        </div>
        <div class="p-2.5 space-y-1">
          <p class="text-[9px] font-bold uppercase tracking-widest px-1 mb-1.5" style="color:var(--text-muted)">Login
            rápido (emulador)</p>
          <template x-for="u in devUsers" :key="u.email">
            <button @click="_devQuickLogin(u.email)" :disabled="cloudSyncing"
              class="dev-mock-btn w-full text-left px-2.5 py-1.5 rounded-xl text-xs font-semibold flex items-center justify-between gap-2 disabled:opacity-40 disabled:cursor-wait"
              :style="cloudUser?.email === u.email
                ? 'background:color-mix(in srgb,var(--accent) 12%,var(--surface-muted));border:1px solid color-mix(in srgb,var(--accent) 40%,transparent);color:var(--accent)'
                : 'background:var(--surface-muted);border:1px solid var(--border);color:var(--text-primary)'">
              <span x-text="u.icon + ' ' + u.label"></span>
              <span x-show="cloudUser?.email === u.email" class="w-1.5 h-1.5 rounded-full flex-shrink-0"
                style="background:var(--accent)"></span>
            </button>
          </template>
          <div class="pt-1.5 mt-1" :style="`border-top:1px solid var(--border)`">
            <p class="text-[9px] font-bold uppercase tracking-widest px-1 mb-1.5 mt-1" style="color:var(--text-muted)">
              Logout rápido</p>
            <button x-show="isCloudAuthenticated" @click="cloudLogout(); open = false"
              class="dev-mock-btn w-full text-left px-2.5 py-1.5 rounded-xl text-xs font-semibold"
              style="background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);color:#ef4444">🚪
              Logout</button>
            <p x-show="!isCloudAuthenticated" class="text-[10px] text-center py-1" style="color:var(--text-muted)">
              Nenhuma sessão ativa</p>
          </div>
        </div>
      </div>
    </div>
  </template>


  <!-- Login Nudge (aparece 3s após carregar para usuários não autenticados) -->
  <div x-show="showLoginNudge && !isCloudAuthenticated" x-transition:enter="transition ease-out duration-500"
    x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0"
    x-transition:leave="transition ease-in duration-300" x-transition:leave-start="opacity-100 translate-y-0"
    x-transition:leave-end="opacity-0 translate-y-4"
    class="fixed bottom-20 left-1/2 -translate-x-1/2 z-[80] w-full max-w-sm px-4" style="display:none">
    <div class="rounded-2xl shadow-2xl overflow-hidden"
      style="background:var(--surface-card);border:1px solid var(--border)">
      <div class="flex items-center gap-3 px-4 py-3">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 text-white text-base"
          style="background:var(--accent)">🔓</div>
        <div class="flex-1 min-w-0">
          <p class="text-xs font-bold text-text-primary leading-tight">Faça login para mais recursos</p>
          <p class="text-[11px] text-text-muted mt-0.5 leading-snug">Acompanhe seus pedidos em tempo real</p>
        </div>
        <button @click="showLoginNudge = false; showClientLogin = true"
          class="flex-shrink-0 px-3 py-1.5 rounded-xl text-xs font-bold text-white transition-all active:scale-95"
          :style="'background:var(--accent)'">Entrar</button>
        <button @click="showLoginNudge = false; loginNudgeDismissed = true"
          class="flex-shrink-0 w-7 h-7 rounded-lg flex items-center justify-center text-text-muted hover:text-text-primary hover:bg-surface-muted transition-all">
          <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="flex items-center divide-x divide-border border-t border-border">
        <template
          x-for="feat in [{icon:'📦',text:'Status do pedido'},{icon:'🕐',text:'Histórico'},{icon:'🔔',text:'Notificações'}]"
          :key="feat.text">
          <div class="flex-1 flex flex-col items-center gap-0.5 py-2 px-1">
            <span class="text-sm" x-text="feat.icon"></span>
            <span class="text-[9px] text-text-muted text-center leading-tight" x-text="feat.text"></span>
          </div>
        </template>
      </div>
    </div>
  </div>

</body>

</html>

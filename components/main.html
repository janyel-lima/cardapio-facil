<!-- ══════════════════════════════════════════
     TELA INICIAL — admin / worker
     (oculta quando adminViewingMenu=true)
══════════════════════════════════════════ -->


<div x-show="(isCloudAdmin || isCloudWorker) && !adminViewingMenu" x-transition:enter="transition ease-out duration-300"
    x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
    class="max-w-2xl mx-auto px-4 pt-4 pb-10 space-y-5">

    <!-- Saudação + toggle loja -->
    <div class="flex items-start justify-between gap-3">
        <div>
            <h2 class="font-display font-bold text-text-primary text-lg leading-tight"
                x-text="'Olá, ' + (userProfile.displayName || cloudUser?.email?.split('@')[0] || 'Admin') + ' 👋'"></h2>
            <p class="text-xs text-text-muted mt-0.5" x-text="omTodayKpi.active + ' pedido(s) ativo(s) agora'"></p>
        </div>
        <button @click="config.isOpen=!config.isOpen; saveConfig()"
            class="flex items-center gap-2 px-3 py-2 rounded-xl border flex-shrink-0 transition-all" :style="config.isOpen
        ? 'border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.08)'
        : 'border-color:var(--border);background:var(--surface-muted)'">
            <span class="text-xs font-semibold" :style="config.isOpen ? 'color:#16a34a' : 'color:var(--text-muted)'"
                x-text="config.isOpen ? 'Aberta' : 'Fechada'"></span>
            <div class="relative w-9 h-5 rounded-full transition-colors"
                :style="config.isOpen ? 'background:#22c55e' : 'background:var(--border)'">
                <div class="absolute top-0.5 w-4 h-4 bg-white rounded-full shadow transition-transform"
                    :class="config.isOpen ? 'translate-x-4' : 'translate-x-0.5'"></div>
            </div>
        </button>
    </div>

    <!-- KPIs rápidos -->
    <div class="grid grid-cols-3 gap-2.5">
        <template x-for="kpi in [
      { label:'Pedidos hoje', value: omTodayKpi.total,                color:'#ef4444' },
      { label:'Ativos agora', value: omTodayKpi.active,               color:'#f59e0b' },
      { label:'Receita hoje', value: formatMoney(omTodayKpi.revenue),  color:'#22c55e' },
    ]" :key="kpi.label">
            <div class="admin-card text-center px-3 py-3">
                <p class="text-lg font-display font-bold leading-none" :style="`color:${kpi.color}`" x-text="kpi.value">
                </p>
                <p class="text-[10px] text-text-muted mt-1" x-text="kpi.label"></p>
            </div>
        </template>
    </div>

    <!-- Cards de ação -->
    <p class="text-[10px] font-semibold text-text-muted uppercase tracking-wider">Ações rápidas</p>
    <div class="grid grid-cols-2 gap-3">

        <!-- Painel admin -->
        <button @click="showAdminPanel = true"
            class="admin-card flex flex-col gap-3 p-4 text-left hover:border-red-400/40 transition-all active:scale-[0.98]">
            <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0"
                style="background:rgba(239,68,68,.1)">
                <svg class="w-5 h-5" style="color:#ef4444" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <circle cx="12" cy="12" r="3" />
                </svg>
            </div>
            <div>
                <p class="text-sm font-bold text-text-primary">Painel admin</p>
                <p class="text-[11px] text-text-muted mt-0.5 leading-snug">Produtos, categorias, promoções e
                    configurações
                </p>
            </div>
        </button>

        <!-- Pedidos ao vivo -->
        <button @click="showAdminPanel = true; adminTab = 'order-manager'; omEnterTab()"
            class="admin-card flex flex-col gap-3 p-4 text-left hover:border-green-400/40 transition-all active:scale-[0.98] relative">
            <div class="flex items-center gap-1.5 absolute top-3 right-3">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                <span class="text-[9px] font-bold" style="color:#16a34a">AO VIVO</span>
            </div>
            <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0"
                style="background:rgba(34,197,94,.1)">
                <svg class="w-5 h-5" style="color:#16a34a" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
                </svg>
            </div>
            <div>
                <p class="text-sm font-bold text-text-primary">Pedidos ao vivo</p>
                <p class="text-[11px] text-text-muted mt-0.5 leading-snug">Fila de preparo, kanban e atualização de
                    status
                </p>
            </div>
        </button>

        <!-- Desempenho (em breve) -->
        <div class="admin-card flex flex-col gap-3 p-4 opacity-50 cursor-not-allowed relative">
            <span class="absolute top-3 right-3 text-[9px] font-bold px-1.5 py-0.5 rounded-md"
                style="background:var(--surface-muted);color:var(--text-muted);border:1px solid var(--border)">em
                breve</span>
            <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0"
                style="background:var(--surface-muted)">
                <svg class="w-5 h-5 text-text-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14" />
                </svg>
            </div>
            <div>
                <p class="text-sm font-bold text-text-primary">Desempenho</p>
                <p class="text-[11px] text-text-muted mt-0.5 leading-snug">Métricas, tendências e análise de vendas</p>
            </div>
        </div>

        <!-- Relatórios -->
        <button @click="showAdminPanel = true; adminTab = 'reports'"
            class="admin-card flex flex-col gap-3 p-4 text-left hover:border-yellow-400/40 transition-all active:scale-[0.98]">
            <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0"
                style="background:rgba(245,158,11,.1)">
                <svg class="w-5 h-5" style="color:#d97706" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                </svg>
            </div>
            <div>
                <p class="text-sm font-bold text-text-primary">Relatórios</p>
                <p class="text-[11px] text-text-muted mt-0.5 leading-snug">Fechamento do dia, Excel, CSV e JSON</p>
            </div>
        </button>

    </div><!-- /grid ações -->

    <!-- Ver cardápio como cliente -->
    <button @click="adminViewingMenu = true"
        class="w-full flex items-center justify-center gap-2 py-3 rounded-2xl border border-border text-sm text-text-muted font-semibold transition-all hover:border-accent/30 hover:text-text-primary"
        style="background:var(--surface-muted)">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
        </svg>
        Ver cardápio como cliente
    </button>

</div><!-- /tela inicial admin/worker -->


<!-- ══════════════════════════════════════════
     FILTROS + CARDÁPIO
     Clientes: sempre visível
     Admin: só quando adminViewingMenu=true
══════════════════════════════════════════ -->
<div x-show="!isCloudAdmin && !isCloudWorker || adminViewingMenu">

    <!-- Botão voltar ao painel (apenas admin em modo preview) -->
    <div x-show="adminViewingMenu" class="max-w-2xl mx-auto px-4 pt-4">
        <button @click="adminViewingMenu = false"
            class="flex items-center gap-1.5 text-xs font-semibold text-text-muted hover:text-text-primary px-3 py-2 rounded-xl border border-border transition-all mb-2"
            style="background:var(--surface-muted)">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
            Voltar ao painel
        </button>
    </div>

    <!-- Filtros: promoções + categorias (ocultos durante busca) -->
    <div x-show="!searchQuery" x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 -translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
        class="max-w-2xl mx-auto px-4 pt-4 space-y-3" style="display:none">

        <!-- ── Promoções ativas ── -->
        <div x-show="activePromos.length > 0" style="display:none">
            <div class="fub-wrap">
                <div class="fub-glow" aria-hidden="true"></div>
                <div class="fub-shimmer" aria-hidden="true"></div>
                <div class="fub-orb fub-orb-1" aria-hidden="true"></div>
                <div class="fub-orb fub-orb-2" aria-hidden="true"></div>
                <div class="fub-orb fub-orb-3" aria-hidden="true"></div>
                <div class="fub-orb-wave" aria-hidden="true"></div>

                <div class="fub-header">
                    <span class="fub-icon" aria-hidden="true">🔥</span>
                    <div class="fub-header-text">
                        <span class="fub-label">Promoções Ativas</span>
                        <span class="fub-sub"
                            x-text="activePromos.length + (activePromos.length === 1 ? ' promoção disponível' : ' promoções disponíveis')"></span>
                    </div>
                    <span x-show="selectedPromoFilter !== null && selectedPromoFilter !== '__any_item_promo__'"
                        class="fub-badge" style="display:none"
                        x-text="promoFilterCount(selectedPromoFilter) + (promoFilterCount(selectedPromoFilter) === 1 ? ' item' : ' itens')"></span>
                    <span x-show="selectedPromoFilter === null" class="fub-badge" x-text="activePromos.length"></span>
                    <button x-show="selectedPromoFilter !== null" @click="selectedPromoFilter = null" class="fu-clear"
                        style="display:none">
                        <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 6 6 18M6 6l12 12" />
                        </svg>
                        Limpar
                    </button>
                </div>

                <div class="fub-rule" aria-hidden="true"></div>

                <div class="fub-carousel">
                    <button @click="$refs.fubPromoTrack.scrollBy({left:-220,behavior:'smooth'})"
                        class="fu-arrow fu-arrow-l" aria-label="Rolar para esquerda">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 19l-7-7 7-7" />
                        </svg>
                    </button>

                    <div x-ref="fubPromoTrack" class="fub-track">
                        <template x-for="promo in activePromos" :key="promo.id">
                            <div class="fub-pcard" :class="{
                'fub-pcard-active':     selectedPromoFilter === promo.id,
                'fub-pcard-delivery':   promo.type === 'freeDelivery',
                'fub-pcard-percentage': promo.type === 'percentage',
                'fub-pcard-fixed':      promo.type === 'fixed',
              }" @click="selectedPromoFilter = (selectedPromoFilter === promo.id ? null : promo.id)">
                                <div class="fub-pcard-perf" aria-hidden="true"></div>
                                <div class="fub-pcard-value">
                                    <span x-show="promo.type === 'percentage'" style="display:none">
                                        <span class="fub-pcard-num" x-text="promo.value"></span>
                                        <span class="fub-pcard-unit">%</span>
                                    </span>
                                    <span x-show="promo.type === 'fixed'" style="display:none">
                                        <span class="fub-pcard-unit fub-pcard-unit-pre">R$</span>
                                        <span class="fub-pcard-num" x-text="promo.value"></span>
                                    </span>
                                    <span x-show="promo.type === 'freeDelivery'" style="display:none"
                                        class="fub-pcard-icon-lg">🚚</span>
                                    <span x-show="promo.type === 'coupon'" style="display:none"
                                        class="fub-pcard-icon-lg">✂️</span>
                                </div>
                                <div class="fub-pcard-off"
                                    x-text="promo.type === 'freeDelivery' ? 'Frete Grátis' : promo.type === 'coupon' ? 'Cupom' : 'OFF'">
                                </div>
                                <div class="fub-pcard-dash" aria-hidden="true"></div>
                                <div class="fub-pcard-name" x-text="promo.name"></div>
                                <span class="fub-pcard-count"
                                    x-show="promo.type !== 'freeDelivery' && promo.scope !== 'cart'"
                                    style="display:none"
                                    x-text="promoFilterCount(promo.id) + (promoFilterCount(promo.id) === 1 ? ' item' : ' itens')"></span>
                                <span class="fub-pcard-check" aria-hidden="true">
                                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                        stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M20 6L9 17l-5-5" />
                                    </svg>
                                </span>
                            </div>
                        </template>
                    </div>

                    <button @click="$refs.fubPromoTrack.scrollBy({left:220,behavior:'smooth'})"
                        class="fu-arrow fu-arrow-r" aria-label="Rolar para direita">
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 5l7 7-7 7" />
                        </svg>
                    </button>
                    <div class="fub-fade-l"></div>
                    <div class="fub-fade-r"></div>
                </div>
            </div>
        </div><!-- /promoções -->

        <!-- ── Categorias ── -->
        <div class="fuc-wrap">
            <div class="fuc-glow" aria-hidden="true"></div>
            <div class="fuc-shimmer" aria-hidden="true"></div>
            <div class="fuc-orb fuc-orb-1" aria-hidden="true"></div>
            <div class="fuc-orb fuc-orb-2" aria-hidden="true"></div>
            <div class="fuc-orb fuc-orb-3" aria-hidden="true"></div>
            <div class="fuc-orb-wave" aria-hidden="true"></div>

            <div class="fuc-header">
                <span class="fuc-icon" aria-hidden="true">🍽️</span>
                <div class="fuc-header-text">
                    <span class="fuc-label">Cardápio</span>
                    <span class="fuc-sub"
                        x-text="activeCategories.length + (activeCategories.length === 1 ? ' categoria' : ' categorias')"></span>
                </div>
                <span x-show="activeTab !== null || selectedPromoFilter === '__any_item_promo__'"
                    class="fuc-badge fuc-badge-filtered" style="display:none">
                    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 6H4M15 12H9M12 18h0" />
                    </svg>
                    Filtrado
                </span>
                <span x-show="activeTab === null && selectedPromoFilter !== '__any_item_promo__'" class="fuc-badge"
                    x-text="activeCategories.length"></span>
                <button x-show="activeTab !== null || selectedPromoFilter !== null"
                    @click="activeTab = null; selectedPromoFilter = null" class="fu-clear" style="display:none">
                    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 6 6 18M6 6l12 12" />
                    </svg>
                    Limpar
                </button>
            </div>

            <div class="fuc-rule" aria-hidden="true"></div>

            <div class="fuc-carousel">
                <button @click="$refs.fucCatTrack.scrollBy({left:-220,behavior:'smooth'})" class="fu-arrow fu-arrow-l"
                    aria-label="Rolar para esquerda">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M15 19l-7-7 7-7" />
                    </svg>
                </button>

                <div x-ref="fucCatTrack" class="fuc-track">
                    <!-- Todos -->
                    <button @click="activeTab = null; selectedPromoFilter = null" class="fu-card"
                        :class="activeTab === null ? 'fu-card-solid' : ''">
                        <span class="fu-card-emoji">🏠</span>
                        <span class="fu-card-label">Todos</span>
                        <span class="fu-card-badge" x-text="selectedPromoFilter
                ? promoFilterCount(selectedPromoFilter)
                : (items ?? []).filter(i => i.available).length"></span>
                    </button>

                    <!-- Categorias dinâmicas -->
                    <template x-for="cat in activeCategories" :key="cat.id">
                        <button @click="activeTab = (activeTab === cat.id ? null : cat.id)" class="fu-card" :class="[
                activeTab === cat.id ? 'fu-card-solid' : '',
                selectedPromoFilter && categoryCount(cat.id).filtered === 0 ? 'fu-card-dimmed' : ''
              ]">
                            <span class="fu-card-emoji" x-text="cat.icon || '📦'"></span>
                            <span class="fu-card-label" x-text="cat.name"></span>
                            <span x-show="!selectedPromoFilter" class="fu-card-badge"
                                x-text="categoryCount(cat.id).total"></span>
                            <span x-show="!!selectedPromoFilter" class="fu-card-badge"
                                :class="categoryCount(cat.id).filtered > 0 ? 'fu-card-badge-match' : 'fu-card-badge-zero'"
                                x-text="categoryCount(cat.id).filtered"></span>
                        </button>
                    </template>
                </div>

                <button @click="$refs.fucCatTrack.scrollBy({left:220,behavior:'smooth'})" class="fu-arrow fu-arrow-r"
                    aria-label="Rolar para direita">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.8"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 5l7 7-7 7" />
                    </svg>
                </button>
                <div class="fuc-fade-l"></div>
                <div class="fuc-fade-r"></div>
            </div>
        </div><!-- /categorias -->

        <!-- Label cross-filter (categoria + promoção ativos simultaneamente) -->
        <div x-show="crossFilterLabel !== null" x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 translate-y-1" x-transition:enter-end="opacity-100 translate-y-0"
            x-transition:leave="transition ease-in duration-150" x-transition:leave-start="opacity-100 translate-y-0"
            x-transition:leave-end="opacity-0 translate-y-1" style="display:none"
            class="flex items-center justify-between mt-5 gap-3 px-3 py-2 rounded-xl"
            :style="`background:color-mix(in srgb,var(--accent) 8%,var(--surface-muted));border:1px solid color-mix(in srgb,var(--accent) 20%,transparent)`">
            <span class="flex items-center gap-2 text-xs font-semibold" style="color:var(--accent)">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M20 6H4M15 12H9M12 18h0" />
                </svg>
                <span x-text="crossFilterLabel"></span>
            </span>
            <button @click="activeTab = null; selectedPromoFilter = null"
                class="flex items-center gap-1 text-[10px] font-bold px-2 py-1 rounded-lg transition-all duration-150 hover:scale-105 active:scale-95"
                :style="`background:color-mix(in srgb,var(--accent) 15%,transparent);color:var(--accent)`"
                aria-label="Limpar todos os filtros">
                <svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M18 6 6 18M6 6l12 12" />
                </svg>
                Limpar tudo
            </button>
        </div>

    </div><!-- /filtros -->

</div><!-- /wrapper cliente + admin preview -->


<!-- Campo de busca -->
<div x-transition:enter="transition ease-out duration-200 mt-10" x-transition:enter-start="opacity-0 -translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0" class="max-w-2xl mt-5 mx-auto px-4 pb-4">
    <div class="relative">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-text-muted"
            fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z" />
        </svg>
        <input type="text" x-model="searchQuery" placeholder="Buscar no cardápio…"
            class="w-full pl-9 pr-4 py-2.5 bg-surface-muted rounded-xl text-sm text-text-primary placeholder-text-muted outline-none focus:ring-2 ring-accent transition-all">
        <button x-show="searchQuery" @click="searchQuery=''"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-text-muted hover:text-text-primary">✕</button>
    </div>
</div>

<!-- Resultado de busca -->
<div x-show="searchQuery" class="mb-4">
    <p class="text-sm text-text-muted">
        <span x-text="filteredItems.length"></span> resultado(s) para
        "<span class="text-text-primary font-medium" x-text="searchQuery"></span>"
    </p>
</div>

<!-- Toggle de visualização -->
<div class="flex items-center justify-end mb-4">
    <div class="flex items-center gap-1 p-1 rounded-xl border border-border bg-surface-muted">
        <button @click="viewMode = 'grid'" :class="viewMode === 'grid'
            ? 'bg-surface-card text-text-primary shadow-sm'
            : 'text-text-muted hover:text-text-primary'"
            class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200">
            <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 16 16">
                <rect x="1" y="1" width="6" height="6" rx="1.5" />
                <rect x="9" y="1" width="6" height="6" rx="1.5" />
                <rect x="1" y="9" width="6" height="6" rx="1.5" />
                <rect x="9" y="9" width="6" height="6" rx="1.5" />
            </svg>
            <span>Grade</span>
        </button>
        <button @click="viewMode = 'list'" :class="viewMode === 'list'
            ? 'bg-surface-card text-text-primary shadow-sm'
            : 'text-text-muted hover:text-text-primary'"
            class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-semibold transition-all duration-200">
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 16 16" stroke="currentColor" stroke-width="1.8">
                <line x1="1" y1="4" x2="15" y2="4" />
                <line x1="1" y1="8" x2="15" y2="8" />
                <line x1="1" y1="12" x2="15" y2="12" />
            </svg>
            <span>Lista</span>
        </button>
    </div>
</div>

<!-- Estado vazio -->
<div x-show="filteredItems.length === 0" class="flex flex-col items-center justify-center py-20 text-center">
    <div class="text-6xl mb-4">🍽️</div>
    <h3 class="text-lg font-display font-bold text-text-primary mb-2">Nenhum item encontrado</h3>
    <p class="text-sm text-text-muted">Tente outra categoria ou busca diferente.</p>
</div>

<!-- Label cross-filter inline (acima da grid) -->
<div x-show="crossFilterLabel !== null" class="fu-cross mb-4 mt-4 font-bold" style="display:none">
    <div class="fu-cross-line fu-cross-line-l"></div>
    <span class="fu-cross-label" x-text="crossFilterLabel"></span>
    <div class="fu-cross-line fu-cross-line-r"></div>
</div>

<!-- ══════════════════════════════════════════
         GRID / LISTA DE PRODUTOS
    ══════════════════════════════════════════ -->
<div :class="viewMode === 'grid'
      ? 'grid grid-cols-1 sm:grid-cols-2 gap-4'
      : 'flex flex-col gap-3'">

    <template x-for="item in filteredItems" :key="item.id">
        <div x-cloak
            class="product-card group relative bg-surface-card border border-border overflow-hidden cursor-pointer transition-all duration-300 hover:shadow-xl hover:shadow-black/10 hover:border-accent/30"
            :class="[
            !item.available ? 'opacity-60' : '',
            viewMode === 'grid'
              ? 'rounded-3xl flex flex-col hover:-translate-y-0.5'
              : 'rounded-2xl flex flex-row'
          ]" @click="openProductModal(item)">

            <!-- Imagem -->
            <div class="relative overflow-hidden bg-surface-muted flex-shrink-0"
                :class="viewMode === 'grid' ? 'w-full' : 'w-[110px]'"
                :style="viewMode === 'grid' ? 'height:180px' : 'min-height:100px'">

                <img :src="item.image || 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600'"
                    :alt="item.name"
                    class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105"
                    style="will-change:transform">

                <!-- Gradiente inferior (grid) -->
                <div x-show="viewMode === 'grid'" class="absolute inset-x-0 bottom-0 h-24 pointer-events-none"
                    style="background:linear-gradient(to top,rgba(0,0,0,0.65) 0%,transparent 100%)"></div>

                <!-- Overlay indisponível -->
                <div x-show="!item.available" class="absolute inset-0 flex items-center justify-center"
                    style="display:none;background:rgba(0,0,0,0.45);backdrop-filter:blur(3px)">
                    <span x-show="viewMode === 'grid'" class="text-white font-bold text-sm px-4 py-1.5 rounded-full"
                        style="background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.25)">Indisponível</span>
                </div>

                <!-- Badge: desconto de preço -->
                <div x-show="dbReady && item.promoPrice != null"
                    class="absolute top-2 left-2 inline-flex items-center gap-1 font-black text-white leading-none"
                    :class="viewMode === 'grid'
                ? 'text-[11px] px-2 py-1 rounded-xl'
                : 'text-[10px] px-1.5 py-0.5 rounded-lg'"
                    style="display:none;background:linear-gradient(135deg,#ef4444,#dc2626);box-shadow:0 4px 12px rgba(239,68,68,.4)">
                    <span x-show="viewMode === 'grid'">🏷️</span>
                    <span x-text="'−' + cardPct(item) + '%'"></span>
                </div>

                <!-- Badge: promo de carrinho -->
                <div x-show="dbReady && item.promoPrice == null && cardAllPromos(item).length > 0"
                    class="absolute top-2 left-2 inline-flex items-center gap-1 font-bold text-white leading-none"
                    :class="viewMode === 'grid'
                ? 'text-[11px] px-2 py-1 rounded-xl'
                : 'text-[10px] px-1.5 py-0.5 rounded-lg'"
                    style="display:none;background:linear-gradient(135deg,#f97316,#ea580c);box-shadow:0 4px 12px rgba(249,115,22,.4)">
                    <span>🔥</span>
                    <span x-show="viewMode === 'grid'">PROMO</span>
                </div>

                <!-- Badges direita (grid) -->
                <div x-show="viewMode === 'grid'" class="absolute top-3 right-3 flex flex-col gap-1.5 items-end">
                    <div x-show="item.featured"
                        class="inline-flex items-center gap-1 px-2 py-1 rounded-xl text-[11px] font-bold text-white leading-none"
                        style="display:none;background:linear-gradient(135deg,#f59e0b,#d97706);box-shadow:0 4px 12px rgba(245,158,11,.5)">
                        ⭐ Destaque
                    </div>
                    <div x-show="item.complements && item.complements.length > 0"
                        class="inline-flex items-center gap-1 px-2 py-1 rounded-xl text-[11px] font-semibold text-white/90 leading-none"
                        style="display:none;background:rgba(0,0,0,0.4);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.15)">
                        ✦ Adicionais
                    </div>
                </div>

                <!-- Featured (lista) -->
                <div x-show="viewMode === 'list' && item.featured"
                    class="absolute bottom-2 left-2 inline-flex items-center px-1.5 py-0.5 rounded-lg text-[10px] font-bold text-white leading-none"
                    style="display:none;background:linear-gradient(135deg,#f59e0b,#d97706)">⭐</div>

                <!-- Preço + botão sobre imagem (grid) -->
                <div x-show="viewMode === 'grid'"
                    class="absolute bottom-3 left-4 right-3 flex items-end justify-between gap-2">
                    <div class="flex items-baseline gap-1.5">
                        <span x-show="item.promoPrice != null" class="text-white/55 text-xs line-through font-medium"
                            style="display:none" x-text="formatMoney(item.price)"></span>
                        <span class="text-white font-black text-xl leading-none"
                            style="text-shadow:0 2px 8px rgba(0,0,0,0.4)"
                            x-text="formatMoney(item.promoPrice != null ? item.promoPrice : item.price)"></span>
                    </div>
                    <button @click.stop="addToCart(item)" :disabled="!item.available"
                        class="w-9 h-9 rounded-2xl flex-shrink-0 flex items-center justify-center text-white transition-all duration-200 active:scale-90 disabled:opacity-40 disabled:cursor-not-allowed hover:scale-110"
                        :style="item.available
                  ? 'background:var(--accent);box-shadow:0 4px 14px rgba(var(--accent-rgb),.55)'
                  : 'background:rgba(255,255,255,0.2)'">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M12 4v16m8-8H4" />
                        </svg>
                    </button>
                </div>
            </div><!-- /imagem -->

            <!-- Conteúdo textual -->
            <div class="flex flex-col flex-1 min-w-0" :class="viewMode === 'grid' ? 'gap-2.5 p-4' : 'gap-1.5 p-3.5'">
                <div>
                    <div class="flex items-start justify-between gap-2">
                        <h3 class="font-display font-bold text-text-primary text-sm leading-snug line-clamp-1"
                            x-text="item.name"></h3>
                        <span x-show="viewMode === 'list' && item.complements && item.complements.length > 0"
                            class="flex-shrink-0 text-[9px] font-semibold px-1.5 py-0.5 rounded-md text-text-muted bg-surface-muted border border-border"
                            style="display:none">✦ Adicionais</span>
                    </div>
                    <p class="text-[10px] text-text-muted font-medium tracking-wide"
                        x-text="getCategoryName(item.category)">
                    </p>
                </div>

                <p class="text-xs text-text-muted leading-relaxed line-clamp-2"
                    :class="viewMode === 'grid' ? 'flex-1' : ''" x-text="item.desc"></p>

                <!-- Chips de promoções -->
                <div x-show="dbReady && cardAllPromos(item).length > 0" class="flex flex-wrap"
                    :class="viewMode === 'grid' ? 'gap-1.5' : 'gap-1'" style="display:none"
                    x-html="cardAllPromosHTML(item)">
                </div>

                <!-- Savings (grid) -->
                <div x-show="viewMode === 'grid' && dbReady && cardHasSavings(item)"
                    class="flex items-center gap-2 px-3 py-2 rounded-xl"
                    style="display:none;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2)">
                    <svg class="w-3 h-3 flex-shrink-0" style="color:#22c55e" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <p class="text-[10px] font-semibold leading-snug" style="color:#22c55e"
                        x-text="cardSavingsLabel(item)">
                    </p>
                </div>

                <!-- Rodapé lista: preço + botão -->
                <div x-show="viewMode === 'list'" class="flex items-center justify-between gap-2 mt-auto pt-1"
                    style="display:none">
                    <div class="flex items-baseline gap-1.5 flex-wrap">
                        <span x-show="item.promoPrice != null"
                            class="text-[11px] text-text-muted line-through font-medium" style="display:none"
                            x-text="formatMoney(item.price)"></span>
                        <span class="font-black text-base leading-none" style="color:var(--accent)"
                            x-text="formatMoney(item.promoPrice != null ? item.promoPrice : item.price)"></span>
                        <span x-show="dbReady && cardHasSavings(item)" class="text-[10px] font-semibold"
                            style="display:none;color:#22c55e" x-text="cardSavingsLabel(item)"></span>
                    </div>
                    <button @click.stop="addToCart(item)" :disabled="!item.available"
                        class="flex-shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-white text-xs font-bold transition-all duration-200 active:scale-95 disabled:opacity-40 disabled:cursor-not-allowed"
                        :style="item.available
                  ? 'background:var(--accent);box-shadow:0 4px 12px rgba(var(--accent-rgb),.4)'
                  : 'background:rgba(128,128,128,0.3)'">
                        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M12 4v16m8-8H4" />
                        </svg>
                        <span x-show="item.available">Adicionar</span>
                        <span x-show="!item.available" style="display:none">Indisponível</span>
                    </button>
                </div>
            </div><!-- /conteúdo -->

        </div><!-- /product-card -->
    </template>
</div><!-- /grid -->
